<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)" filter="url(#glow)"/>
  
  <!-- Inner geometric pattern representing autonomy -->
  <g stroke="#fff" stroke-width="8" fill="none" opacity="0.9">
    <!-- Concentric rings -->
    <circle cx="256" cy="256" r="180"/>
    <circle cx="256" cy="256" r="140"/>
    <circle cx="256" cy="256" r="100"/>
    
    <!-- Orbital lines -->
    <ellipse cx="256" cy="256" rx="180" ry="60" transform="rotate(30 256 256)"/>
    <ellipse cx="256" cy="256" rx="180" ry="60" transform="rotate(150 256 256)"/>
    <ellipse cx="256" cy="256" rx="180" ry="60" transform="rotate(270 256 256)"/>
    
    <!-- Central node -->
    <circle cx="256" cy="256" r="40" fill="#fff" stroke="none"/>
    
    <!-- Connection dots -->
    <g fill="#fff">
      <circle cx="256" cy="76" r="8"/>
      <circle cx="256" cy="436" r="8"/>
      <circle cx="76" cy="256" r="8"/>
      <circle cx="436" cy="256" r="8"/>
      <circle cx="146" cy="146" r="6"/>
      <circle cx="366" cy="146" r="6"/>
      <circle cx="146" cy="366" r="6"/>
      <circle cx="366" cy="366" r="6"/>
    </g>
  </g>
  
  <!-- Greek letter epsilon (ε) styled as Eidolon -->
  <text x="256" y="272" font-family="'Times New Roman', serif" font-size="140" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle" opacity="0.95">ε</text>
  
  <!-- Subtle data streams -->
  <g stroke="#fff" stroke-width="2" opacity="0.3">
    <path d="M100,256 Q256,180 412,256" fill="none"/>
    <path d="M100,256 Q256,332 412,256" fill="none"/>
  </g>
</svg>
