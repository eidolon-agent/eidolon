<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eidolon Agent</title>
  <style>
    :root {
      --bg: #050505;
      --card: #0a0a0a;
      --border: #00ff88;
      --text: #e0e0e0;
      --muted: #666;
      --success: #00ff88;
      --accent: #00d4ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      background-image: radial-gradient(circle at 50% 50%, rgba(0,255,136,0.05) 0%, transparent 60%);
    }
    .container {
      max-width: 900px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 60px 40px;
      background: rgba(10,10,10,0.9);
      box-shadow: 0 0 40px rgba(0,255,136,0.15), inset 0 0 60px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 4rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, var(--success), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
    }
    .tagline {
      font-size: 1.2rem;
      color: var(--muted);
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    .status {
      display: inline-block;
      background: var(--success);
      color: #000;
      padding: 8px 24px;
      border-radius: 30px;
      font-weight: 900;
      margin-bottom: 40px;
      box-shadow: 0 0 20px var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 40px 0;
    }
    .card {
      background: var(--card);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s;
    }
    .card:hover {
      border-color: var(--border);
      box-shadow: 0 0 20px rgba(0,255,136,0.2);
      transform: translateY(-4px);
    }
    .card h3 {
      font-size: 0.9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .metric {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--success);
      margin-bottom: 5px;
    }
    .metric.sub {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .btn {
      display: inline-block;
      background: transparent;
      color: var(--success);
      border: 2px solid var(--success);
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: 900;
      border-radius: 8px;
      margin: 10px;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      letter-spacing: 1px;
    }
    .btn:hover {
      background: var(--success);
      color: #000;
      box-shadow: 0 0 30px var(--success);
    }
    .links {
      margin-top: 50px;
      color: var(--muted);
    }
    .links a {
      color: var(--accent);
      text-decoration: none;
      margin: 0 10px;
    }
    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="status">● OPERATIONAL</span>
    <h1>EIDOLON</h1>
    <p class="tagline">Autonomous Self-Sustaining Economic Agent</p>

    <div class="grid">
      <div class="card">
        <h3>Trust Score</h3>
        <div class="metric" id="trustScore">--</div>
        <div class="sub">ERC-8004 Reputation</div>
      </div>
      <div class="card">
        <h3>x402 Clients</h3>
        <div class="metric" id="clientCount">0</div>
        <div class="sub">Active accounts</div>
      </div>
      <div class="card">
        <h3>Treasury Position</h3>
        <div class="metric positive" id="netPosition">$0.00</div>
        <div class="sub">Net credit ledger</div>
      </div>
      <div class="card">
        <h3>Uptime</h3>
        <div class="metric" id="uptime">--</div>
        <div class="sub">Since restart</div>
      </div>
    </div>

    <a href="/dashboard" class="btn">OPEN DASHBOARD →</a>
    <a href="/health" class="btn" style="border-color: var(--accent); color: var(--accent);">HEALTH CHECK</a>

    <div class="links">
      <a href="https://github.com/eidolon-agent/eidolon" target="_blank">GitHub</a>
      <a href="https://synthesis.devfolio.co/p/eidolon-autonomous-self-sustaining-economic-agent-78d9" target="_blank">Synthesis</a>
      <a href="/docs" target="_blank">API Docs</a>
    </div>
  </div>

  <script>
    async function fetchStats() {
      try {
        const res = await fetch('/stats');
        if (!res.ok) return;
        const d = await res.json();
        document.getElementById('trustScore').textContent = d.trustScore;
        document.getElementById('clientCount').textContent = d.clientCount;
        document.getElementById('netPosition').textContent = '$' + d.netPosition.toFixed(2);
        document.getElementById('uptime').textContent = formatUptime(d.uptime);
      } catch (e) {}
    }
    function formatUptime(s) {
      const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
      if (h>0) return h+'h '+m+'m';
      if (m>0) return m+'m '+sec+'s';
      return sec+'s';
    }
    fetchStats();
    setInterval(fetchStats, 5000);
  </script>
</body>
</html>
