[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./" }]

[etherscan]
base = { chain = "base-mainnet", key = "${BASE_API_KEY}" }
base-sepolia = { chain = "base-sepolia", key = "${BASE_SEPOLIA_API_KEY}" }

[profile.ci]
fuzz = { runs = 1000 }
